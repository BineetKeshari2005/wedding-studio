<!DOCTYPE html>
<html>
<head>
<style>
  .parent { display: flex; align-items: stretch; background: #ccc; padding: 10px; gap: 10px; }
  .left { background: red; width: 200px; display: flex; flex-direction: column; height: 0; min-height: 100%; }
  .scrollable { overflow-y: auto; flex: 1; min-height: 0; background: orange; }
  .right { background: blue; flex: 1; color: white; }
  .content { height: 1000px; background: yellow; }
</style>
</head>
<body>
<div class="parent">
  <div class="left">
    <div>Header</div>
    <div class="scrollable">
      <div class="content">Tall content</div>
    </div>
  </div>
  <div class="right">
    Right box needs to dictate height.
    <br><br><br><br><br><br><br><br>End.
  </div>
</div>
</body>
</html>
